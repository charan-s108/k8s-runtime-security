- rule: Terminal shell in container
  desc: Detects any shell spawned inside a container
  condition: >
    container.id != host
    and proc.name in (bash, sh, zsh, dash, fish)
    and evt.type = execve
    and evt.dir = 
  output: >
    CRITICAL Shell spawned in container
    (user=%user.name user_loginuid=%user.loginuid
    pod=%k8s.pod.name ns=%k8s.ns.name
    container=%container.name image=%container.image.repository
    cmd=%proc.cmdline)
  priority: CRITICAL
  tags: [shell, container, mitre_execution]

- rule: Privilege escalation via sudo
  desc: Detects sudo usage inside a container
  condition: >
    container.id != host
    and proc.name = sudo
    and evt.type = execve
    and evt.dir = 
  output: >
    WARNING Sudo executed in container
    (user=%user.name pod=%k8s.pod.name ns=%k8s.ns.name
    cmd=%proc.cmdline)
  priority: WARNING
  tags: [privilege_escalation, container]

- rule: Sensitive file read
  desc: Detects reads of credential files inside containers
  condition: >
    container.id != host
    and evt.type in (open, openat)
    and evt.dir = 
    and fd.name in (/etc/shadow, /etc/sudoers, /root/.ssh/id_rsa,
                    /root/.ssh/authorized_keys, /proc/self/environ)
  output: >
    CRITICAL Sensitive file read in container
    (user=%user.name file=%fd.name pod=%k8s.pod.name
    ns=%k8s.ns.name cmd=%proc.cmdline)
  priority: CRITICAL
  tags: [credential_access, container]

- rule: Package manager in container
  desc: Detects apt or yum running inside a container
  condition: >
    container.id != host
    and proc.name in (apt, apt-get, yum, apk, pip, pip3)
    and evt.type = execve
    and evt.dir = 
  output: >
    WARNING Package manager executed in container
    (user=%user.name pod=%k8s.pod.name ns=%k8s.ns.name
    cmd=%proc.cmdline)
  priority: WARNING
  tags: [execution, container, defense_evasion]

- rule: Write binary directory at runtime
  desc: Detects new files written to /usr/bin at runtime
  condition: >
    container.id != host
    and evt.type in (open, openat, creat)
    and evt.dir = 
    and fd.name startswith /usr/bin
    and open_write
  output: >
    CRITICAL Binary directory modified at runtime
    (user=%user.name file=%fd.name pod=%k8s.pod.name
    ns=%k8s.ns.name)
  priority: CRITICAL
  tags: [persistence, container]

- rule: Unexpected outbound connection
  desc: Detects outbound connections on unusual ports
  condition: >
    container.id != host
    and evt.type = connect
    and evt.dir = 
    and fd.typechar = 4
    and not fd.rport in (80, 443, 53, 8080, 8443, 6443)
  output: >
    WARNING Unexpected outbound connection from container
    (user=%user.name pod=%k8s.pod.name ns=%k8s.ns.name
    connection=%fd.name)
  priority: WARNING
  tags: [command_and_control, container]

- rule: Container running as root
  desc: Detects processes running as root inside containers
  condition: >
    container.id != host
    and evt.type = execve
    and evt.dir = 
    and user.uid = 0
    and proc.name not in (pause, tini, dumb-init)
  output: >
    WARNING Process running as root in container
    (user=%user.name uid=%user.uid pod=%k8s.pod.name
    ns=%k8s.ns.name cmd=%proc.cmdline)
  priority: WARNING
  tags: [privilege_escalation, container]

- rule: Netcat or nmap in container
  desc: Detects network recon tools inside containers
  condition: >
    container.id != host
    and proc.name in (nc, ncat, nmap, netcat, masscan, socat)
    and evt.type = execve
    and evt.dir = 
  output: >
    CRITICAL Network recon tool detected in container
    (user=%user.name tool=%proc.name pod=%k8s.pod.name
    ns=%k8s.ns.name cmd=%proc.cmdline)
  priority: CRITICAL
  tags: [discovery, container, lateral_movement]